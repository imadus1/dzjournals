<!DOCTYPE html>
<html lang="en">
<head>

    <title>Scientific Journal Master Index</title>
    
    <style>
        /* Removes default browser margins so the app sits flush */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f9fafb; /* Matches your app's bg-gray-50 */
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* Makes the iframe responsive on both desktop and mobile */
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        iframe {
            width: 100%;
            max-width: 1200px; /* Keeps it from getting too wide on huge monitors */
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwraHNogrTulddem5nYeECQn7tf4hxG60CZRY6mfthcrMYiOLHR7v0E2fDzHqScZc-f/exec"

    </div>

</body>
</html>
